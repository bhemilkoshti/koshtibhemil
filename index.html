<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Cost Calculator - INR & USD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .calculator-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .cost-display {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .total-cost {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .cost-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .cost-item {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .cost-item span {
            display: block;
            font-size: 1.1em;
            font-weight: bold;
            line-height: 1.5;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            height: 400px;
        }

        .providers {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .provider-btn {
            flex: 1;
            min-width: 100px;
            padding: 15px 20px;
            border: 3px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
        }

        .provider-btn.active {
            background: #28a745 !important;
            color: white !important;
            border-color: #28a745 !important;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.4);
        }

        .provider-btn.aws { border-color: #ff9900; color: #ff9900; }
        .provider-btn.azure { border-color: #0078d4; color: #0078d4; }
        .provider-btn.gcp { border-color: #4285f4; color: #4285f4; }

        .provider-btn:hover {
            transform: scale(1.02);
        }

        .time-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-btn {
            padding: 12px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .time-btn.active {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        small {
            font-size: 0.85em;
            opacity: 0.95;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .providers {
                flex-direction: column;
            }

            .time-selector {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>☁️ Cloud Cost Calculator</h1>
            <p>Show cost in both ₹ INR and $ USD</p>
        </div>

        <div class="main-content">
            <div class="calculator-section">
                <h2 class="section-title">📊 Configuration</h2>

                <div class="providers">
                    <button class="provider-btn active aws" data-provider="aws">🌥️ AWS</button>
                    <button class="provider-btn azure" data-provider="azure">🔵 Azure</button>
                    <button class="provider-btn gcp" data-provider="gcp">📱 GCP</button>
                </div>

                <div class="time-selector">
                    <button class="time-btn active" data-time="1">1 Mo</button>
                    <button class="time-btn" data-time="3">3 Mo</button>
                    <button class="time-btn" data-time="6">6 Mo</button>
                    <button class="time-btn" data-time="9">9 Mo</button>
                    <button class="time-btn" data-time="12">12 Mo</button>
                </div>

                <div class="input-group">
                    <label>💻 Compute Instances</label>
                    <input type="number" id="computeInstances" value="2" min="0">
                </div>

                <div class="input-group">
                    <label>💾 Storage (GB)</label>
                    <input type="number" id="storageGB" value="100" min="0">
                </div>

                <div class="input-group">
                    <label>📤 Data Transfer Out (GB)</label>
                    <input type="number" id="dataTransferGB" value="50" min="0">
                </div>

                <div class="input-group">
                    <label>⏰ Compute Hours/Month</label>
                    <input type="number" id="computeHours" value="730" min="0">
                </div>

                <div class="cost-display">
                    <div class="total-cost" id="totalCost">₹0<br><small>$0.00</small></div>
                    <div id="providerLabel">AWS - Total Cost</div>

                    <div class="cost-breakdown">
                        <div class="cost-item">
                            <span id="computeCost">₹0<br><small>$0.00</small></span>
                            <small>Compute</small>
                        </div>
                        <div class="cost-item">
                            <span id="storageCost">₹0<br><small>$0.00</small></span>
                            <small>Storage</small>
                        </div>
                        <div class="cost-item">
                            <span id="transferCost">₹0<br><small>$0.00</small></span>
                            <small>Transfer</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="calculator-section">
                <h2 class="section-title">📈 Cost Comparison (All Providers)</h2>
                <div class="chart-container">
                    <canvas id="costChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        class CloudCostCalculator {
            constructor() {
                this.currentProvider = 'aws';
                this.currentTimePeriod = 1;
                this.chart = null;
                this.exchangeRate = 83; // 1 USD = 83 INR
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateDisplay();
            }

            bindEvents() {
                document.querySelectorAll('.provider-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        this.currentProvider = e.currentTarget.dataset.provider;
                        this.updateDisplay();
                    });
                });

                document.querySelectorAll('.time-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        this.currentTimePeriod = parseInt(e.currentTarget.dataset.time);
                        this.updateDisplay();
                    });
                });

                document.querySelectorAll('input').forEach(input => {
                    input.addEventListener('input', () => this.updateDisplay());
                });
            }

            getPricing(provider) {
                const prices = {
                    aws: { compute: 8.30, storage: 1.91, transfer: 7.47 },
                    azure: { compute: 9.96, storage: 1.74, transfer: 7.22 },
                    gcp: { compute: 7.89, storage: 1.66, transfer: 9.96 }
                };
                return prices[provider] || prices.aws;
            }

            formatINR(amount) {
                return '₹' + Math.round(amount).toLocaleString('en-IN');
            }

            formatUSD(amount) {
                return '$' + (amount / this.exchangeRate).toFixed(2);
            }

            updateDisplay() {
                const instances = parseFloat(document.getElementById('computeInstances').value) || 0;
                const storageGB = parseFloat(document.getElementById('storageGB').value) || 0;
                const dataTransferGB = parseFloat(document.getElementById('dataTransferGB').value) || 0;
                const computeHours = parseFloat(document.getElementById('computeHours').value) || 0;

                const pricing = this.getPricing(this.currentProvider);
                const months = this.currentTimePeriod;

                const computeCost = instances * pricing.compute * computeHours * months;
                const storageCost = storageGB * pricing.storage * months;
                const transferCost = dataTransferGB * pricing.transfer;
                const totalCost = computeCost + storageCost + transferCost;

                document.getElementById('totalCost').innerHTML =
                    this.formatINR(totalCost) + "<br><small>" + this.formatUSD(totalCost) + "</small>";

                document.getElementById('computeCost').innerHTML =
                    this.formatINR(computeCost) + "<br><small>" + this.formatUSD(computeCost) + "</small>";

                document.getElementById('storageCost').innerHTML =
                    this.formatINR(storageCost) + "<br><small>" + this.formatUSD(storageCost) + "</small>";

                document.getElementById('transferCost').innerHTML =
                    this.formatINR(transferCost) + "<br><small>" + this.formatUSD(transferCost) + "</small>";

                document.getElementById('providerLabel').textContent =
                    `${this.currentProvider.toUpperCase()} - ${this.currentTimePeriod} Month${this.currentTimePeriod > 1 ? 's' : ''}`;

                this.updateChart();
            }

            updateChart() {
                const ctx = document.getElementById('costChart').getContext('2d');

                const instances = parseFloat(document.getElementById('computeInstances').value) || 0;
                const storageGB = parseFloat(document.getElementById('storageGB').value) || 0;
                const dataTransferGB = parseFloat(document.getElementById('dataTransferGB').value) || 0;
                const computeHours = parseFloat(document.getElementById('computeHours').value) || 0;
                const months = this.currentTimePeriod;

                const awsTotal = instances * 8.30 * computeHours * months + storageGB * 1.91 * months + dataTransferGB * 7.47;
                const azureTotal = instances * 9.96 * computeHours * months + storageGB * 1.74 * months + dataTransferGB * 7.22;
                const gcpTotal = instances * 7.89 * computeHours * months + storageGB * 1.66 * months + dataTransferGB * 9.96;

                if (this.chart) {
                    this.chart.destroy();
                }

                this.chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['AWS', 'GCP', 'Azure'],
                        datasets: [{
                            label: `${this.currentTimePeriod} Months`,
                            data: [awsTotal, gcpTotal, azureTotal],
                            backgroundColor: ['#ff9900', '#4285f4', '#0078d4'],
                            borderColor: ['#e68900', '#3367d6', '#106ebe'],
                            borderWidth: 2,
                            borderRadius: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (context) => {
                                        const value = context.raw;
                                        return ` ${this.formatINR(value)} / ${this.formatUSD(value)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: (value) => '₹' + Math.round(value).toLocaleString('en-IN')
                                }
                            }
                        }
                    }
                });
            }
        }

        new CloudCostCalculator();
    </script>
</body>
</html>
